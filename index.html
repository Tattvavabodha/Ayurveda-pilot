<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आयुर्वेदमहोदधिः - Deep Analysis Dashboard</title>
    <style>
        :root {
            --maroon: #800000;
            --cream-bg: #fcfbfa;
            --card-border: #ebdcc7;
            --text-dark: #2c2c2c;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--cream-bg);
            color: var(--text-dark);
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            line-height: 1.7;
        }
        .site-title {
            text-align: center;
            color: var(--maroon);
            font-size: 2.8rem;
            margin-bottom: 40px;
            font-weight: bold;
        }
        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .box-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .clickable-card {
            background: #ffffff;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .clickable-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(128,0,0,0.1);
        }
        .card-devanagari {
            font-size: 1.6rem;
            color: var(--maroon);
            font-weight: bold;
            margin-bottom: 5px;
        }
        .card-iast {
            font-size: 0.95rem;
            color: #666;
            font-style: italic;
        }
        .breadcrumb {
            background: #f1ebd9;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
        .breadcrumb span {
            color: var(--maroon);
            cursor: pointer;
            font-weight: bold;
        }
        .list-item {
            background: #fff;
            padding: 15px 20px;
            margin-bottom: 10px;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            cursor: pointer;
        }
        .list-item:hover { background: #fffdfa; border-color: var(--maroon); }

        /* Verse Reader Panels */
        .verse-display {
            font-size: 1.8rem;
            text-align: center;
            background: #fffdf9;
            border: 1px solid var(--maroon);
            padding: 30px;
            border-radius: 8px;
            white-space: pre-line;
            color: #111;
            margin-bottom: 25px;
        }
        .accordion-menu { margin-top: 15px; }
        .accordion-btn {
            background: #eee6dc;
            color: #4a231a;
            width: 100%;
            text-align: left;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            margin-top: 8px;
            cursor: pointer;
        }
        .accordion-panel {
            background: #fff;
            border: 1px solid #eee6dc;
            padding: 20px;
            display: none;
        }
        
        /* Interactive Words */
        .padaccheda-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 1.3rem;
        }
        .pada-token {
            padding: 4px 10px;
            background: #f5ece2;
            border-bottom: 2px solid #cbb69f;
            border-radius: 4px;
            cursor: pointer;
        }
        .pada-token:hover { background: #ebdecb; }
        
        .grammar-display-box {
            margin-top: 15px;
            background: #fff9f2;
            border-left: 4px solid var(--maroon);
            padding: 15px;
            display: none;
        }
        .commentary-select-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        select {
            padding: 8px 12px;
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid var(--maroon);
        }
    </style>
</head>
<body>

    <div class="site-title" id="site-main-title">आयुर्वेदमहोदधिः</div>
    <div class="breadcrumb" id="breadcrumb-bar" style="display:none;"></div>

    <!-- Home View -->
    <div id="view-home" class="view-section active">
        <div class="box-grid" id="samhita-grid"></div>
    </div>

    <!-- Sthana View -->
    <div id="view-sthana" class="view-section">
        <h2>Select Sthana</h2>
        <div id="sthana-list"></div>
    </div>

    <!-- Adhyaya View -->
    <div id="view-adhyaya" class="view-section">
        <h2>Select Adhyaya</h2>
        <div id="adhyaya-list"></div>
    </div>

    <!-- Verse List View -->
    <div id="view-verselist" class="view-section">
        <h2>Select Verse</h2>
        <div id="verse-list"></div>
    </div>

    <!-- Complete Verse Analysis Reader Dashboard -->
    <div id="view-versereader" class="view-section">
        <div class="verse-display" id="reader-verse-text"></div>

        <div class="accordion-menu">
            <button class="accordion-btn" onclick="toggleAcc('acc-trans')">Transliteration</button>
            <div id="acc-trans" class="accordion-panel">Devanagari view complete above. Transliterated layout generated dynamically.</div>

            <button class="accordion-btn" onclick="toggleAcc('acc-pada')">Padaccheda (Interactive Word Grammar)</button>
            <div id="acc-pada" class="accordion-panel">
                <div class="padaccheda-flex" id="padaccheda-container"></div>
                <div class="grammar-display-box" id="grammar-box"></div>
            </div>

            <button class="accordion-btn" onclick="toggleAcc('acc-anvaya')">Anvaya (Prose Order)</button>
            <div id="acc-anvaya" class="accordion-panel" id="reader-anvaya"></div>

            <button class="accordion-btn" onclick="toggleAcc('acc-arthas')">Saralartha (Sanskrit)</button>
            <div id="acc-arthas" class="accordion-panel" id="reader-sanskrit-artha"></div>

            <button class="accordion-btn" onclick="toggleAcc('acc-arthae')">Saralartha (English)</button>
            <div id="acc-arthae" class="accordion-panel" id="reader-english-artha"></div>

            <button class="accordion-btn" onclick="toggleAcc('acc-icd')">WHO ICD-11 Code Mapping</button>
            <div id="acc-icd" class="accordion-panel" id="reader-icd-code"></div>

            <button class="accordion-btn" onclick="toggleAcc('acc-commentary')">Hermeneutic Commentaries (टीका)</button>
            <div id="acc-commentary" class="accordion-panel">
                <div class="commentary-select-container">
                    <select id="select-comm-source" onchange="renderCommentaryText()">
                        <option value="sarvangasundara">Sarvangasundara (सर्वाङ्गसुन्दरा)</option>
                        <option value="ayurvedarasayanam">Ayurvedarasayanam (आयुर्वेदरसायनम्)</option>
                    </select>
                    <select id="select-comm-scope" onchange="renderCommentaryText()">
                        <option value="whole">Commentary on Whole Sutra</option>
                        <option value="pada">Commentary on Selected Pada</option>
                    </select>
                    <select id="select-comm-pada" onchange="renderCommentaryText()" style="display:none;"></select>
                </div>
                <div id="commentary-text-output" style="white-space: pre-line; background: #fffdfa; padding: 15px; border: 1px dashed #cbb69f;"></div>
            </div>
        </div>
    </div>

    <script>
        let database = null;
        let path = { samhita: null, sthana: null, adhyaya: null, verse: null };

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                database = data;
                document.getElementById('site-main-title').innerText = data.site_title;
                initHome();
            });

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            updateBreadcrumb();
        }

        function updateBreadcrumb() {
            const bar = document.getElementById('breadcrumb-bar');
            if (!path.samhita) { bar.style.display = 'none'; return; }
            bar.style.display = 'block';
            let html = `<span onclick="resetToHome()">Home</span>`;
            if (path.samhita) html += ` &gt; <span onclick="loadSamhita('${path.samhita.id}')">${path.samhita.name_devanagari}</span>`;
            if (path.sthana) html += ` &gt; <span onclick="loadSthana('${path.sthana.name}')">${path.sthana.name}</span>`;
            if (path.adhyaya) html += ` &gt; <span onclick="loadAdhyaya('${path.adhyaya.name}')">${path.adhyaya.name.split(':')[0]}</span>`;
            bar.innerHTML = html;
        }

        function resetToHome() {
            path = { samhita: null, sthana: null, adhyaya: null, verse: null };
            showView('view-home');
        }

        function initHome() {
            const grid = document.getElementById('samhita-grid');
            grid.innerHTML = '';
            database.samhitas.forEach(s => {
                const card = document.createElement('div');
                card.className = 'clickable-card';
                card.onclick = () => loadSamhita(s.id);
                card.innerHTML = `
                    <div class="card-devanagari">${s.name_devanagari}</div>
                    <div class="card-iast">${s.name_iast}</div>
                `;
                grid.appendChild(card);
            });
        }

        function loadSamhita(id) {
            const s = database.samhitas.find(x => x.id === id);
            path.samhita = s; path.sthana = null; path.adhyaya = null; path.verse = null;
            
            const listContainer = document.getElementById('sthana-list');
            listContainer.innerHTML = '';
            if(s.sthanas.length === 0) {
                listContainer.innerHTML = '<p style="padding:20px;">Pilot project data mapping ongoing for this text selection.</p>';
            } else {
                s.sthanas.forEach(st => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerText = st.name;
                    div.onclick = () => loadSthana(st.name);
                    listContainer.appendChild(div);
                });
            }
            showView('view-sthana');
        }

        function loadSthana(sthanaName) {
            const st = path.samhita.sthanas.find(x => x.name === sthanaName);
            path.sthana = st; path.adhyaya = null; path.verse = null;
            
            const listContainer = document.getElementById('adhyaya-list');
            listContainer.innerHTML = '';
            st.adhyayas.forEach(ad => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerText = ad.name;
                div.onclick = () => loadAdhyaya(ad.name);
                listContainer.appendChild(div);
            });
            showView('view-adhyaya');
        }

        function loadAdhyaya(adhyayaName) {
            const ad = path.sthana.adhyayas.find(x => x.name === adhyayaName);
            path.adhyaya = ad; path.verse = null;
            
            const listContainer = document.getElementById('verse-list');
            listContainer.innerHTML = '';
            ad.verses.forEach(v => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<strong>${v.number}</strong> - ${v.text.substring(0,30)}...`;
                div.onclick = () => loadVerseReader(v);
                listContainer.appendChild(div);
            });
            showView('view-verselist');
        }

        function loadVerseReader(v) {
            path.verse = v;
            document.getElementById('reader-verse-text').innerText = v.text;
            document.getElementById('acc-anvaya').innerText = v.anvaya;
            document.getElementById('acc-arthas').innerText = v.saralartha_sanskrit;
            document.getElementById('acc-arthae').innerText = v.saralartha_english;
            document.getElementById('acc-icd').innerText = v.icd11_mapping;

            // Load Padaccheda
            const padaContainer = document.getElementById('padaccheda-container');
            padaContainer.innerHTML = '';
            const padaSelect = document.getElementById('select-comm-pada');
            padaSelect.innerHTML = '';

            v.padaccheda.forEach(p => {
                const span = document.createElement('span');
                span.className = 'pada-token';
                span.innerText = p.word;
                span.onclick = () => displayGrammar(p);
                padaContainer.appendChild(span);

                const opt = document.createElement('option');
                opt.value = p.word; opt.innerText = p.word;
                padaSelect.appendChild(opt);
            });

            renderCommentaryText();
            showView('view-versereader');
        }

        function displayGrammar(p) {
            const box = document.getElementById('grammar-box');
            box.innerHTML = '';
            if(!p.hasGrammar) {
                box.innerHTML = '<strong>Structural delimiter or punctuation marker.</strong>';
            } else {
                Object.keys(p.grammar).forEach(k => {
                    box.innerHTML += `<div><strong>${k}:</strong> ${p.grammar[k]}</div>`;
                });
            }
            box.style.display = 'block';
        }

        function renderCommentaryText() {
            const source = document.getElementById('select-comm-source').value;
            const scope = document.getElementById('select-comm-scope').value;
            const padaSelector = document.getElementById('select-comm-pada');
            
            if(scope === 'pada') {
                padaSelector.style.display = 'inline-block';
                const currentPada = padaSelector.value;
                const txt = path.verse.commentaries[source].padas[currentPada] || "No targeted sub-commentary entry mapped to this specific word component.";
                document.getElementById('commentary-text-output').innerText = txt;
            } else {
                padaSelector.style.display = 'none';
                document.getElementById('commentary-text-output').innerText = path.verse.commentaries[source].whole;
            }
        }

        function toggleAcc(id) {
            const p = document.getElementById(id);
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
